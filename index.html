<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SCIT Consulting - AI-First Digital Transformation</title>
    <meta name="title" content="SCIT Consulting - AI-First Digital Transformation" />
    <meta
      name="description"
      content="We implement AI tools, automate processes and build intelligent agents. From strategy to execution, SCIT Consulting transforms your business with artificial intelligence."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scitconsulting.eu" />
    <meta property="og:title" content="SCIT Consulting - AI-First Digital Transformation" />
    <meta
      property="og:description"
      content="We implement AI tools, automate processes and build intelligent agents. From strategy to execution, SCIT Consulting transforms your business with artificial intelligence."
    />
    <meta property="og:image" content="https://scitconsulting.eu/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="SCIT Consulting" />

    <!-- Canonical -->
    <link rel="canonical" href="https://scitconsulting.eu/" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://scitconsulting.eu" />
    <meta property="twitter:title" content="SCIT Consulting - AI-First Digital Transformation" />
    <meta
      property="twitter:description"
      content="We implement AI tools, automate processes and build intelligent agents. From strategy to execution, SCIT Consulting transforms your business with artificial intelligence."
    />
    <meta property="twitter:image" content="https://scitconsulting.eu/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#673de6" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "SCIT Consulting",
        "url": "https://scitconsulting.eu",
        "logo": "https://scitconsulting.eu/images/logo-black.png",
        "description": "AI-first digital transformation consultancy. We implement AI tools, automate processes, and build intelligent agents.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "EE"
        },
        "areaServed": ["Europe"],
        "knowsAbout": [
          "Artificial Intelligence",
          "AI Automation",
          "AI Agents",
          "Chatbots",
          "Digital Transformation",
          "AI Consulting"
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "AI Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "AI Automation & Process Automation",
                "url": "https://scitconsulting.eu/services/ai-automation"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Custom AI Agents",
                "url": "https://scitconsulting.eu/services/ai-agents"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Chatbots & Conversational AI",
                "url": "https://scitconsulting.eu/services/chatbots"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "AI Tools Implementation",
                "url": "https://scitconsulting.eu/services/ai-tools"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "AI Strategy & Consulting",
                "url": "https://scitconsulting.eu/services/ai-consulting"
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Digital Transformation",
                "url": "https://scitconsulting.eu/services/digital-transformation"
              }
            }
          ]
        }
      }
    </script>
  </head>

  <body class="group/body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
